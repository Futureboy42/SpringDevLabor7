<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>Spring Thyme Seed Starter Manager</title>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <link rel="stylesheet" type="text/css" media="all" href="../../css/stsm.css" th:href="@{/css/stsm.css}"/>
  <link href="/src/style.css" rel="stylesheet">
  <style>
    .actions-cell form { display: inline-block; margin-right: 5px; }
    .edit-input { width: 100%; box-sizing: border-box; }
    .edit-ul { padding-left: 10px; margin: 0; list-style-type: none; }
  </style>
</head>

<body>

<div>
  <img src="../../images/stsmlogo.png" alt="STSM logo" title="STSM logo"
       th:src="@{/images/stsmlogo.png}" th:alt-title="#{title.application}"/>
</div>

<div class="seedstarterlist" th:unless="${#lists.isEmpty(allSeedStarters)}">

  <h2 th:text="#{title.list}">List of Seed Starters</h2>

  <table>
    <thead>
    <tr>
      <th th:text="#{seedstarter.datePlanted}">Date Planted</th>
      <th th:text="#{seedstarter.covered}">Covered</th>
      <th th:text="#{seedstarter.type}">Type</th>
      <th th:text="#{seedstarter.features}">Features</th>
      <th th:text="#{seedstarter.rows}">Rows</th>
      <th>Origin</th>
      <th>Műveletek</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="sb : ${allSeedStarters}">

      <!-- olvasási nézet -->
      <th:block th:if="${editRowId != sb.id}">
        <td th:text="${{sb.datePlanted}}">13/01/2011</td>
        <td th:text="#{|bool.${sb.covered}|}">yes</td>
        <td th:text="#{|seedstarter.type.${sb.type}|}">Wireframe</td>
        <td th:text="${#strings.arrayJoin(
                                 #messages.arrayMsg(
                                   #strings.arrayPrepend(sb.features,'seedstarter.feature.')),
                                 ', ')}">Electric Heating, Turf</td>
        <td>
          <table>
            <tbody>
            <tr th:each="row,rowStat : ${sb.rows}">
              <td th:text="${rowStat.count}">1</td>
              <td th:text="${row.variety.name}">Thymus Thymi</td>
              <td th:text="${row.seedsPerCell}">12</td>
            </tr>
            </tbody>
          </table>
        </td>

        <td th:text="${sb.origin}">Unknown</td>

        <td class="actions-cell">
          <!-- Szerkesztés gomb -->
          <form th:action="@{/seedstartermng}" method="get">
            <input type="hidden" name="editRow" th:value="${sb.id}" />
            <button type="submit">Szerkesztés</button>
          </form>
          <form th:action="@{/seedstartermng(id=${sb.id})}" method="post">
            <button type="submit" name="delete">Törlés</button>
          </form>
        </td>
      </th:block>

      <!-- Inline Szerkesztési nézet -->
      <th:block th:if="${editRowId == sb.id}">
        <!-- HTML5 form a táblázaton kívüli hivatkozáshoz -->
        <form th:id="'editForm-' + ${sb.id}" th:action="@{/seedstartermng}" method="post"></form>

        <!-- ID rejtett mezőként -->
        <input type="hidden" name="id" th:value="${sb.id}" th:form="'editForm-' + ${sb.id}" />

        <td>
          <input type="text" name="datePlanted" th:value="${{sb.datePlanted}}" th:form="'editForm-' + ${sb.id}" class="edit-input" />
        </td>
        <td>
          <input type="hidden" name="_covered" value="on" th:form="'editForm-' + ${sb.id}" />
          <input type="checkbox" name="covered" th:checked="${sb.covered}" th:form="'editForm-' + ${sb.id}" />
        </td>
        <td>
          <select name="type" th:form="'editForm-' + ${sb.id}">
            <option th:each="type : ${allTypes}"
                    th:value="${type}"
                    th:text="#{${'seedstarter.type.' + type}}"
                    th:selected="${sb.type == type}">Wireframe</option>
          </select>
        </td>
        <td>
          <ul class="edit-ul">
            <li th:each="feat : ${session.allFeatures}">
              <!-- Rejtett mező a Spring miatt -->
              <input type="hidden" name="_features" value="on" th:form="'editForm-' + ${sb.id}"/>
              <input type="checkbox" name="features" th:value="${feat}"
                     th:checked="${sb.features != null and #arrays.contains(sb.features, feat)}"
                     th:form="'editForm-' + ${sb.id}"/>
              <label th:text="#{${'seedstarter.feature.' + feat}}">Feature</label>
            </li>
          </ul>
        </td>
        <td>
          <!-- A beágyazott sorokat nem módosítjuk -->
          <table>
            <tbody>
            <tr th:each="row,rowStat : ${sb.rows}">
              <td th:text="${rowStat.count}">1</td>
              <td th:text="${row.variety.name}">Thymus Thymi</td>
              <td th:text="${row.seedsPerCell}">12</td>
            </tr>
            </tbody>
          </table>
        </td>
        <td>
          <input type="text" name="origin" th:value="${sb.origin}" th:form="'editForm-' + ${sb.id}" class="edit-input" />
        </td>
        <td class="actions-cell">
          <button type="submit" name="saveEdit" th:form="'editForm-' + ${sb.id}" style="background-color:#99cc33;">Mentés</button>
          <!-- Mégse gomb -->
          <a th:href="@{/seedstartermng}">
            <button type="button">Mégse</button>
          </a>
        </td>
      </th:block>

    </tr>
    </tbody>
  </table>

</div>


<div>

  <h2 th:text="#{title.new}">Add new Seed Starter</h2>

  <form action="#" th:action="@{/seedstartermng}" th:object="${seedStarter}" method="post">

    <fieldset>

      <legend th:text="#{seedstarter.data}">Seed Starter Data</legend>

      <ul th:if="${#fields.hasErrors('*')}" class="errorlist">
        <li th:each="err : ${#fields.errors('*')}" th:text="${err}">Input is incorrect</li>
      </ul>


      <div>
        <label for="datePlanted">
          <span th:text="#{seedstarter.datePlanted}">Date planted</span>
          (<span th:text="#{date.format}">YYYY/MM/DD</span>)
        </label>
        <input type="text" th:field="*{datePlanted}" th:errorclass="fieldError" />
      </div>


      <div>
        <label for="origin">Origin</label>
        <input type="text" th:field="*{origin}" />
      </div>


      <div>
        <label th:for="${#ids.next('covered')}" th:text="#{seedstarter.covered}">Covered</label>
        <input type="checkbox" th:field="*{covered}" />
      </div>
      <div>
        <label for="type" th:text="#{seedstarter.type}">Type</label>
        <select th:field="*{type}">
          <option th:each="type : ${allTypes}" th:value="${type}" th:text="#{${'seedstarter.type.' + type}}">Wireframe</option>
        </select>
      </div>
      <div>
        <label th:text="#{seedstarter.features}">Features</label>
        <ul>
          <li th:each="feat : ${session.allFeatures}">
            <input type="checkbox" th:field="*{features}" th:value="${feat}" />
            <label th:for="${#ids.prev('features')}" th:text="#{${'seedstarter.feature.' + feat}}">Electric Heating</label>
          </li>
          <li th:remove="all">
            <input id="removed1" type="checkbox" /> <label for="removed1">Turf</label>
          </li>
        </ul>
      </div>

      <div>
        <label th:text="#{seedstarter.rows}">Rows</label>
        <table>
          <thead>
          <tr>
            <th th:text="#{seedstarter.rows.head.rownum}">Row</th>
            <th th:text="#{seedstarter.rows.head.variety}">Variety</th>
            <th th:text="#{seedstarter.rows.head.seedsPerCell}">Seeds per cell</th>
            <th>
              <button type="submit" name="addRow" th:text="#{seedstarter.row.add}">Add row</button>
            </th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="row,rowStat : *{rows}">
            <td th:text="${rowStat.count}">1</td>
            <td>
              <select th:field="*{rows[__${rowStat.index}__].variety}">
                <option th:each="var : ${allVarieties}" th:value="${var.id}" th:text="${var.name}">Thymus Thymi</option>
              </select>
            </td>
            <td>
              <input type="text" th:field="*{rows[__${rowStat.index}__].seedsPerCell}" th:errorclass="fieldError" />
            </td>
            <td>
              <button type="submit" name="removeRow" th:value="${rowStat.index}" th:text="#{seedstarter.row.remove}">Remove row</button>
            </td>
          </tr>
          </tbody>
        </table>
      </div>

      <div class="submit">
        <button type="submit" name="save" class="bg-green-300" th:text="#{seedstarter.create}">Add Seed Starter</button>
      </div>

    </fieldset>

  </form>

</div>

</body>
</html>
